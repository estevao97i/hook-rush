<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Hook Rush</title>
    <style>
      /* Tela cheia real: o canvas ocupa 100% da janela, sem margens nem
         barras — o fundo do body é igual ao do jogo para nunca aparecer
         área preta, mesmo se a proporção for extrema. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: #12151d;
        height: 100%;
        overflow: hidden;
      }
      /* Safe areas (notch) expostas como CSS vars — lidas pelo jogo para
         posicionar os botões de toque dentro da área segura. */
      :root {
        --sa-top: env(safe-area-inset-top, 0px);
        --sa-right: env(safe-area-inset-right, 0px);
        --sa-bottom: env(safe-area-inset-bottom, 0px);
        --sa-left: env(safe-area-inset-left, 0px);
      }
      #app {
        width: 100%;
        height: 100%;
      }
      canvas {
        touch-action: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
